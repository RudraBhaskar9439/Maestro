<text x="356" y="300" fill="#212529" font-size="12.5">MaestroHook.sol  +  HarbergerAuction.sol</text>
<text x="356" y="322" fill="#212529" font-size="12.5"></text>
<text x="356" y="344" fill="#212529" font-size="12.5">• Hook-owned liquidity vault → LP shares</text>
<text x="356" y="366" fill="#212529" font-size="12.5">• Harberger auction: bid → K=10 delay → manager</text>
<text x="356" y="388" fill="#212529" font-size="12.5">      manager pays rent every block → LPs</text>
<text x="356" y="410" fill="#212529" font-size="12.5">• repositionToPrice(price): band spans [spot, oracle]</text>
<text x="356" y="432" fill="#212529" font-size="12.5">• beforeSwap: _poke charge rent + override fee (≤ 5%)</text>
<text x="356" y="454" fill="#212529" font-size="12.5">• afterSwap: distribute rent to LP shares</text>
<text x="356" y="476" fill="#212529" font-size="12.5">• before add / remove liquidity → REVERT (hook-owned)</text>
