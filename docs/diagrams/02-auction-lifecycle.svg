<text x="530" y="171.25" fill="#e8590c" font-size="18" text-anchor="middle" dominant-baseline="central">→ manager replaced</text>
<text x="141" y="396" fill="#495057" font-size="13" text-anchor="start">after K blocks</text>
<text x="321.5" y="153.5" fill="#495057" font-size="13" text-anchor="start">outbid loop</text>
