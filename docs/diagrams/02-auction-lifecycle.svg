<text x="300" y="54" fill="#1e1e1e" font-size="24" font-weight="700" text-anchor="start">Harberger Auction — Manager Lifecycle</text>
<text x="190" y="153.75" fill="#1971c2" font-size="18" text-anchor="middle" dominant-baseline="central">bid(rentRate, deposit)</text>
<text x="190" y="176.25" fill="#1971c2" font-size="18" text-anchor="middle" dominant-baseline="central">anyone can bid</text>
<text x="190" y="313.75" fill="#e8590c" font-size="18" text-anchor="middle" dominant-baseline="central">K-block delay</text>
<text x="190" y="336.25" fill="#e8590c" font-size="18" text-anchor="middle" dominant-baseline="central">censorship resistance</text>
<text x="190" y="473.75" fill="#2f9e44" font-size="18" text-anchor="middle" dominant-baseline="central">becomes Manager</text>
<text x="190" y="496.25" fill="#2f9e44" font-size="18" text-anchor="middle" dominant-baseline="central">pays rent every block</text>
<text x="530" y="320" fill="#1971c2" font-size="18" text-anchor="middle" dominant-baseline="central">setFee(f ≤ f_max)</text>
<text x="530" y="440" fill="#1971c2" font-size="18" text-anchor="middle" dominant-baseline="central">reposition(band)</text>
<text x="880" y="373.75" fill="#2f9e44" font-size="18" text-anchor="middle" dominant-baseline="central">rent → LPs</text>
<text x="880" y="396.25" fill="#2f9e44" font-size="18" text-anchor="middle" dominant-baseline="central">(rentPerShare accrual)</text>
