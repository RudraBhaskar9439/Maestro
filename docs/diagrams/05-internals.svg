<text x="560" y="60" fill="#1e1e1e" font-size="30" font-weight="700" text-anchor="start">Maestro — Internal Hook Architecture</text>
<text x="470" y="87" fill="#868e96" font-size="15" text-anchor="start">How the contracts work internally: callers → public API → engine → state → Uniswap v4</text>
<text x="450" y="124" fill="#2f9e44" font-size="14" text-anchor="middle" dominant-baseline="central">Pyth @ Eth Sepolia</text>
<text x="790" y="124" fill="#6741d9" font-size="13" text-anchor="middle" dominant-baseline="central">MaestroManagerRSC @ Lasna</text>
<text x="1150" y="124" fill="#1971c2" font-size="13" text-anchor="middle" dominant-baseline="central">ManagerCallback (Unichain, dest)</text>
<text x="465" y="230" fill="#2f9e44" font-size="16" text-anchor="middle" dominant-baseline="central">LP</text>
<text x="845" y="230" fill="#6741d9" font-size="15" text-anchor="middle" dominant-baseline="central">Bidder / Manager</text>
<text x="316" y="329" fill="#1971c2" font-size="16" text-anchor="start">LP API</text>
<text x="316" y="365" fill="#212529" font-size="13" text-anchor="start">deposit(amt0, amt1) → mint shares</text>
<text x="316" y="386" fill="#212529" font-size="13" text-anchor="start">withdraw(shares) → burn + return</text>
<text x="316" y="407" fill="#212529" font-size="13" text-anchor="start">claimRent() → pay pending rent</text>
<text x="716" y="329" fill="#1971c2" font-size="16" text-anchor="start">Auction API  (HarbergerAuction)</text>
<text x="716" y="365" fill="#212529" font-size="13" text-anchor="start">bid(rentRate, deposit)</text>
<text x="716" y="386" fill="#212529" font-size="13" text-anchor="start">setFee(fee ≤ F_MAX) · topUp(amt)</text>
<text x="716" y="407" fill="#212529" font-size="13" text-anchor="start">poke() · withdraw() refunds</text>
<text x="1116" y="329" fill="#1971c2" font-size="16" text-anchor="start">Manager API</text>
<text x="1116" y="365" fill="#212529" font-size="13" text-anchor="start">reposition(lower, upper)</text>
<text x="1116" y="386" fill="#212529" font-size="13" text-anchor="start">repositionToOracle(halfWidth)</text>
<text x="1116" y="407" fill="#212529" font-size="13" text-anchor="start">reads OracleMath + Pyth</text>
<text x="1536" y="329" fill="#1e1e1e" font-size="16" text-anchor="start">Hook callbacks  (PoolManager → hook)</text>
<text x="1536" y="365" fill="#212529" font-size="13" text-anchor="start">beforeInitialize: capture poolKey</text>
<text x="1536" y="386" fill="#212529" font-size="13" text-anchor="start">beforeAddLiquidity → REVERT</text>
<text x="1536" y="407" fill="#212529" font-size="13" text-anchor="start">beforeRemoveLiquidity → REVERT</text>
<text x="1536" y="428" fill="#212529" font-size="13" text-anchor="start">  (liquidity is hook-owned only)</text>
<text x="1536" y="449" fill="#212529" font-size="13" text-anchor="start">beforeSwap → _poke + fee override</text>
<text x="1536" y="470" fill="#212529" font-size="13" text-anchor="start">afterSwap → distribute rent to LPs</text>
<text x="316" y="549" fill="#e8590c" font-size="16" text-anchor="start">_poke(id) — rent + auction engine</text>
<text x="316" y="585" fill="#212529" font-size="13" text-anchor="start">charge rent = rentRate × Δblocks</text>
<text x="316" y="606" fill="#212529" font-size="13" text-anchor="start">→ lease.deposit −= rent</text>
<text x="316" y="627" fill="#212529" font-size="13" text-anchor="start">→ totalRentCharged += rent</text>
<text x="316" y="648" fill="#212529" font-size="13" text-anchor="start">→ rentPerShare += rent / Σshares  (if Σ&gt;0)</text>
<text x="316" y="669" fill="#212529" font-size="13" text-anchor="start">promote pending bid when block ≥ bid+K</text>
<text x="916" y="549" fill="#e8590c" font-size="16" text-anchor="start">unlockCallback  (poolManager.unlock)</text>
<text x="916" y="585" fill="#212529" font-size="13" text-anchor="start">mode: DEPOSIT / WITHDRAW / REPOSITION</text>
<text x="916" y="606" fill="#212529" font-size="13" text-anchor="start">poolManager.modifyLiquidity(band, Δliq)</text>
<text x="916" y="627" fill="#212529" font-size="13" text-anchor="start">settle() pays in · take() pulls out</text>
<text x="316" y="809" fill="#2f9e44" font-size="16" text-anchor="start">Vault state  (MaestroHook)</text>
<text x="316" y="845" fill="#212529" font-size="13" text-anchor="start">positionLiquidity · tickLower · tickUpper</text>
<text x="316" y="866" fill="#212529" font-size="13" text-anchor="start">totalShares · sharesOf[addr]</text>
<text x="316" y="887" fill="#212529" font-size="13" text-anchor="start">rentPerShare · rentDebt[addr]</text>
<text x="316" y="908" fill="#212529" font-size="13" text-anchor="start">poolKey · initialized</text>
<text x="916" y="809" fill="#6741d9" font-size="16" text-anchor="start">Auction state — leases[poolId]</text>
<text x="916" y="845" fill="#212529" font-size="13" text-anchor="start">manager · rentRate · deposit · fee</text>
<text x="916" y="866" fill="#212529" font-size="13" text-anchor="start">pendingBidder · pendingRent · pendingDeposit</text>
<text x="916" y="887" fill="#212529" font-size="13" text-anchor="start">pendingActiveBlock (= bidBlock + K)</text>
<text x="916" y="908" fill="#212529" font-size="13" text-anchor="start">accruedRent · totalRentCharged</text>
<text x="916" y="929" fill="#212529" font-size="13" text-anchor="start">K = 10 · F_MAX = 5% · DEFAULT_FEE = 0.30%</text>
<text x="580" y="1075" fill="#2f9e44" font-size="14" text-anchor="middle" dominant-baseline="central">Pyth + OracleMath — price → sqrtPriceX96 → tick</text>
<text x="1180" y="1075" fill="#1971c2" font-size="15" text-anchor="middle" dominant-baseline="central">Uniswap v4 PoolManager (singleton)</text>
<text x="567.5" y="115" fill="#495057" font-size="13" text-anchor="start">PriceFeedUpdate</text>
<text x="890" y="115" fill="#495057" font-size="13" text-anchor="start">cross-chain callback</text>
<text x="1173" y="217" fill="#495057" font-size="13" text-anchor="start">repositionTo</text>
<text x="1009.5" y="240.5" fill="#495057" font-size="13" text-anchor="start">bid</text>
<text x="538" y="751" fill="#495057" font-size="13" text-anchor="start">rentPerShare</text>
<text x="824" y="748.5" fill="#495057" font-size="13" text-anchor="start">charge · promote</text>
<text x="820.5" y="736" fill="#495057" font-size="13" text-anchor="start">positionLiquidity</text>
<text x="1127.5" y="856" fill="#495057" font-size="13" text-anchor="start">modifyLiquidity</text>
</svg>